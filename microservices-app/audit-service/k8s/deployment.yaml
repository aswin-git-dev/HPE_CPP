apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: ecommerce
  labels:
    app: audit-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      serviceAccountName: audit-service-monitor
      containers:
        - name: audit-service
          image: audit-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
              name: http
          envFrom:
            - configMapRef:
                name: audit-service-config
            - secretRef:
                name: audit-service-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-service-monitor
  namespace: ecommerce
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: audit-service-monitor-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: audit-service-monitor-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: audit-service-monitor-reader
subjects:
  - kind: ServiceAccount
    name: audit-service-monitor
    namespace: ecommerce
