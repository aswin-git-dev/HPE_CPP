apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-service-config
  namespace: ecommerce
data:
  ENV: "prod"
  LOG_LEVEL: "INFO"
  PORT: "8005"
  EVENT_STORE_MAX_EVENTS: "10000"
  CLUSTER_SOURCE_URN: "urn:k8s:cluster:prod-cluster-01"

  # Namespace filtering
  # ALLOWED_NAMESPACES: "ecommerce,default"
  IGNORED_NAMESPACES: "kube-system,kube-public,kube-node-lease"

  # Retention controls
  STORE_RAW_EVENT: "true"
  RAW_EVENT_MAX_BYTES: "64000"
  # RETAINED_FIELDS: "event_id,timestamp,source_type,namespace,service_name,severity,event_type,message,tags,status_code"

  # Observability
  ENABLE_METRICS: "true"

