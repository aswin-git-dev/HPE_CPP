# ─── docker-compose.yaml ───────────────────────────────────────────────────────
# Local development and testing. Mirrors the Kubernetes setup.
# Usage: docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────
networks:
  ecommerce-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongo-data:
    driver: local
  opensearch-data:
    driver: local

services:
  # ── MongoDB (user-service dedicated DB) ───────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: userdb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── User Service (Full Implementation) ────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "userdb"
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Product Service (Full Implementation) ───────────────────────────────
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "productdb"
    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Order Service (Stub) ──────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
    container_name: order-service
    restart: unless-stopped
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "orderdb"
    ports:
      - "8002:8002"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Payment Service (Stub) ────────────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8003:8003"
    networks:
      - ecommerce-net

  # ── Notification Service ───────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    environment:
      MONGO_URI: "mongodb://mongodb:27017"
      DB_NAME: "notification_db"
    ports:
      - "8004:8004"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── OpenSearch (Centralized Security/Event Storage) ───────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Audit Service (Security Monitoring Ingestion) ─────────────────────────
  audit-service:
    build:
      context: ./audit-service
      dockerfile: Dockerfile
    container_name: audit-service
    restart: unless-stopped
    environment:
      ENV: "dev"
      LOG_LEVEL: "INFO"
      PORT: "8005"
      IGNORED_NAMESPACES: "kube-system,kube-public,kube-node-lease"
      STORE_RAW_EVENT: "true"
      RAW_EVENT_MAX_BYTES: "64000"
      OPENSEARCH_URL: "http://opensearch:9200"
      OPENSEARCH_INDEX: "audit-events"
      OPENSEARCH_VERIFY_CERTS: "false"
      OPENSEARCH_TIMEOUT_S: "10"
      OPENSEARCH_MAX_RETRIES: "3"
      ENABLE_METRICS: "true"
    ports:
      - "8005:8005"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── OpenSearch Dashboards (UI) ─────────────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ── Vector (Real Docker log forwarder → audit-service) ─────────────────────
  log-forwarder:
    image: timberio/vector:0.39.0-debian
    container_name: log-forwarder
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./audit-service/vector/vector.toml:/etc/vector/vector.toml:ro
    command: ["--config", "/etc/vector/vector.toml"]
    depends_on:
      audit-service:
        condition: service_healthy
    networks:
      - ecommerce-net
    ports:
      - "8686:8686"