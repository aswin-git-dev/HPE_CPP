# ─── MongoDB Deployment for User Service ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: ecommerce
  labels:
    app: mongodb
    tier: database
spec:
  replicas: 1           # StatefulSet recommended for production replication
  selector:
    matchLabels:
      app: mongodb
  strategy:
    type: Recreate      # Required with ReadWriteOnce PVCs
  template:
    metadata:
      labels:
        app: mongodb
        tier: database
    spec:
      # ── Pin MongoDB to a node labelled role=database (or any worker) ──────
      nodeSelector:
        kubernetes.io/os: linux
      # ── Tolerate any node taints ──────────────────────────────────────────
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_DATABASE
              value: "userdb"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc
