<!DOCTYPE html>
<html>
<head>
  <title>Security Inspector Login</title>
  <style>
    body {
      font-family: Arial;
      background: #f7f3e8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #1f3b24;
    }

    .box {
      background: white;
      padding: 35px;
      width: 350px;
      border-radius: 15px;
      box-shadow: 0 2px 10px #aaa;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #aaa;
    }

    button {
      background: #1f7a3a;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #145326;
    }

    #msg {
      color: red;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Security Inspector Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
  function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "admin" && pass === "admin") {
      window.location.href = "security-dashboard.html";
    } else {
      document.getElementById("msg").innerText = "Invalid username or password";
    }
  }
</script>

</body>
</html>
