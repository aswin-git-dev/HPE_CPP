# ─── OpenSearch ISM Policy Setup Job ─────────────────────────────────────────
# One-shot Kubernetes Job that creates an Index State Management (ISM) policy
# and applies it via an index template. This enforces a 15-day Time-To-Live
# (TTL) on all audit log indices, keeping the memory/disk footprint optimal.
#
# Indices covered:
#   - k8s-audit-*     (Kubernetes API server audit logs)     [source: audit]
#   - falco-alerts-*  (Falco runtime kernel security alerts) [source: falco]
#   - audit-events    (audit-service's own indexed events)
#
# The job waits for OpenSearch to become ready, then creates/updates
# the ISM policy and index templates via the REST API.

apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-ism-setup
  namespace: ecommerce
  labels:
    app: opensearch-ism-setup
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600    # Auto-cleanup job pod 10 min after success
  template:
    metadata:
      labels:
        app: opensearch-ism-setup
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-opensearch
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for OpenSearch at http://opensearch:9200 ..."
              i=0
              while [ "$i" -lt 90 ]; do
                if wget -q -O /dev/null -T 3 http://opensearch:9200/_cluster/health 2>/dev/null; then
                  echo "OpenSearch is reachable."
                  exit 0
                fi
                i=$((i+1))
                sleep 3
              done
              echo "Timeout: OpenSearch never became reachable."
              exit 1
      containers:
        - name: ism-setup
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              set -e
              OS_URL="http://opensearch:9200"

              echo "=== Creating ISM Policy: audit-log-ttl-15d ==="
              curl -s -X PUT "${OS_URL}/_plugins/_ism/policies/audit-log-ttl-15d" \
                -H 'Content-Type: application/json' \
                -d '{
                  "policy": {
                    "description": "Delete audit log indices older than 2 days to reduce memory footprint",
                    "default_state": "hot",
                    "states": [
                      {
                        "name": "hot",
                        "actions": [],
                        "transitions": [
                          {
                            "state_name": "delete",
                            "conditions": {
                              "min_index_age": "2d"
                            }
                          }
                        ]
                      },
                      {
                        "name": "delete",
                        "actions": [
                          {
                            "delete": {}
                          }
                        ],
                        "transitions": []
                      }
                    ],
                    "ism_template": [
                      {
                        "index_patterns": ["k8s-audit-*"],
                        "priority": 100
                      },
                      {
                        "index_patterns": ["falco-alerts-*"],
                        "priority": 100
                      },
                      {
                        "index_patterns": ["audit-events*"],
                        "priority": 100
                      }
                    ]
                  }
                }'
              echo ""
              echo "ISM policy created."

              echo "=== Creating index template: k8s-audit ==="
              curl -s -X PUT "${OS_URL}/_index_template/k8s-audit-template" \
                -H 'Content-Type: application/json' \
                -d '{
                  "index_patterns": ["k8s-audit-*"],
                  "template": {
                    "settings": {
                      "number_of_shards": 1,
                      "number_of_replicas": 0,
                      "plugins.index_state_management.rollover_alias": "k8s-audit"
                    }
                  }
                }'
              echo ""

              echo "=== Creating index template: falco-alerts ==="
              curl -s -X PUT "${OS_URL}/_index_template/falco-alerts-template" \
                -H 'Content-Type: application/json' \
                -d '{
                  "index_patterns": ["falco-alerts-*"],
                  "template": {
                    "settings": {
                      "number_of_shards": 1,
                      "number_of_replicas": 0,
                      "plugins.index_state_management.rollover_alias": "falco-alerts"
                    }
                  }
                }'
              echo ""

              echo "=== ISM setup complete ==="
              echo "Indices matching k8s-audit-*, falco-alerts-*, audit-events* will be auto-deleted after 15 days."
