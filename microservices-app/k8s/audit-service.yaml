apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: ecommerce
  labels:
    app: audit-service
spec:
  replicas: 1
  # Single replica: Recreate avoids "old replica pending termination" sitting forever during
  # rolling updates (common on Minikube). Brief downtime on deploy is OK for dev.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      terminationGracePeriodSeconds: 15
      serviceAccountName: audit-service-monitor
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: hpe/node-group
                    operator: In
                    values:
                      - worker2
      containers:
      - name: audit-service
        image: audit-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8005
        env:
        - name: ENV
          value: "dev"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PORT
          value: "8005"
        - name: CLUSTER_SOURCE_URN
          value: "urn:k8s:cluster:prod-cluster-01"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-service-monitor
  namespace: ecommerce
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: audit-service-monitor-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: audit-service-monitor-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: audit-service-monitor-reader
subjects:
  - kind: ServiceAccount
    name: audit-service-monitor
    namespace: ecommerce
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: audit-service
  ports:
  - name: http
    port: 8005
    targetPort: 8005
