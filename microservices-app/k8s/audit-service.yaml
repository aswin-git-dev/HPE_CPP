apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: ecommerce
  labels:
    app: audit-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      serviceAccountName: audit-service-monitor
      containers:
      - name: audit-service
        image: audit-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8005
        env:
        - name: ENV
          value: "dev"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PORT
          value: "8005"
        - name: CLUSTER_SOURCE_URN
          value: "urn:k8s:cluster:prod-cluster-01"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-service-monitor
  namespace: ecommerce
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: audit-service-monitor-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: audit-service-monitor-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: audit-service-monitor-reader
subjects:
  - kind: ServiceAccount
    name: audit-service-monitor
    namespace: ecommerce
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: audit-service
  ports:
  - name: http
    port: 8005
    targetPort: 8005
