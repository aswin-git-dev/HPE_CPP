apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: ecommerce
  labels:
    app: audit-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
      - name: audit-service
        image: audit-service:latest
        imagePullPolicy: Never  # Assuming local build
        ports:
        - containerPort: 8005
        env:
        - name: ENV
          value: "dev"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PORT
          value: "8005"
        - name: OPENSEARCH_URL
          value: "http://opensearch:9200"
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: audit-service
  ports:
  - name: http
    port: 8005
    targetPort: 8005
