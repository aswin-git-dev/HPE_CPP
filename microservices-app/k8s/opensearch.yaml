apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: ecommerce
  labels:
    app: opensearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
      - name: opensearch
        image: opensearchproject/opensearch:2.11.0
        ports:
        - containerPort: 9200
        env:
        - name: discovery.type
          value: "single-node"
        - name: plugins.security.disabled
          value: "true"
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: opensearch
  ports:
  - port: 9200
    targetPort: 9200
