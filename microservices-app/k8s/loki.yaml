# ─── Loki — Lightweight Log Aggregation for Grafana ──────────────────────────
# Single-instance Loki deployment optimized for Minikube.
# Receives logs from Vector (K8s audit + app logs) and FalcoSidekick (runtime alerts).
# Grafana queries Loki via its built-in LogQL engine.
#
# Access: Internal only — Grafana connects to http://loki.ecommerce.svc:3100

# ════════════════════════════════════════════════════════════════════════════════
# LOKI CONFIGMAP
# ════════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: ecommerce
  labels:
    app: loki
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: 360h          # 15 days TTL
      reject_old_samples: true
      reject_old_samples_max_age: 360h
      max_query_series: 5000
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      delete_request_store: filesystem

    analytics:
      reporting_enabled: false

---
# ════════════════════════════════════════════════════════════════════════════════
# LOKI DEPLOYMENT
# ════════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: ecommerce
  labels:
    app: loki
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: microservices-monitor/node-group
                    operator: In
                    values:
                      - worker2
      containers:
        - name: loki
          image: grafana/loki:3.0.0
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
              name: http
            - containerPort: 9096
              name: grpc
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki/loki.yaml
              subPath: loki.yaml
              readOnly: true
            - name: loki-data
              mountPath: /loki
          resources:
            requests:
              cpu: "50m"
              memory: "100Mi"
            limits:
              cpu: "300m"
              memory: "200Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        - name: loki-data
          emptyDir: {}

---
# ════════════════════════════════════════════════════════════════════════════════
# LOKI SERVICE
# ════════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: ecommerce
  labels:
    app: loki
spec:
  type: ClusterIP
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
    - name: grpc
      port: 9096
      targetPort: 9096
