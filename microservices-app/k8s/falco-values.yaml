# Falco (runtime: syscalls, shells, filesystem, suspicious container behavior) + falcosidekick -> audit-service.
# Install: install-falco.bat (requires Helm). Namespace `falco` must carry project=ecommerce-platform for NetworkPolicy.
#
# Covers filesystem access, process/exec, and default rulesets; alerts POST to /ingest/falco as JSON.

tty: false

controller:
  kind: daemonset

driver:
  enabled: true
  kind: modern_ebpf

falcosidekick:
  enabled: true
  replicaCount: 1
  # Must be under `config` — top-level `webhook` is ignored by the falcosidekick subchart
  # (WEBHOOK_ADDRESS stayed empty → "Enabled Outputs: []").
  config:
    webhook:
      address: "http://audit-service.ecommerce.svc.cluster.local:8005/ingest/falco"
      method: "POST"
      checkcert: false
