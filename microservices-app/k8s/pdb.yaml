# ─── PodDisruptionBudgets ────────────────────────────────────────────────────────
# Each PDB lives in its service's dedicated namespace.
# Ensures at least 1 pod per service is always available during node
# maintenance, rolling updates, or cluster upgrades.

# ── user-service PDB (user-ns) ────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-service-pdb
  namespace: user-ns           # ← dedicated namespace
  labels:
    app: user-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: user-service

---
