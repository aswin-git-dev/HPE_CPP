# ─── PodDisruptionBudget for user-service ──────────────────────────────────────
# Ensures at least 1 user-service pod is always available during node
# maintenance, rolling updates, or cluster upgrades.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-service-pdb
  namespace: ecommerce
  labels:
    app: user-service
spec:
  minAvailable: 1       # Always keep at least 1 pod alive
  selector:
    matchLabels:
      app: user-service

