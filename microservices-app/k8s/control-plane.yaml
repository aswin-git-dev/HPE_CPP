# ─── Control Plane — Kubernetes Dashboard ───────────────────────────────────────
# Deploys the Kubernetes Dashboard as a cluster-wide control plane UI.
# Provides visibility into ALL worker nodes, pods, deployments, and namespaces.
#
# Access the dashboard:
#   1. Get token: kubectl get secret dashboard-admin-token -n control-plane -o jsonpath="{.data.token}" | base64 -d
#   2. Open: https://<node-ip>:30900  (self-signed TLS — accept the browser warning)
#   3. Choose "Token" login and paste the token
#   Or: kubectl port-forward -n control-plane svc/kubernetes-dashboard 8443:443
#       then https://127.0.0.1:8443
#
# Namespace created in namespace.yaml

# ════════════════════════════════════════════════════════════════════════════════
# RBAC — Service Account + ClusterRole + Binding
# ════════════════════════════════════════════════════════════════════════════════

# 1. ServiceAccount for the Dashboard
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-admin
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
    role: control-plane

---
# 2. Long-lived token Secret for dashboard login
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-admin-token
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
  annotations:
    kubernetes.io/service-account.name: dashboard-admin
type: kubernetes.io/service-account-token

---
# 3. ClusterRole — read-only access to all resources across ALL namespaces
#    This allows the dashboard to display nodes, pods, deployments, services,
#    namespaces, events, and metrics from every namespace in the cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-cluster-reader
  labels:
    app: kubernetes-dashboard
    role: control-plane
rules:
  # Core API resources
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - pods/log
      - services
      - endpoints
      - persistentvolumes
      - persistentvolumeclaims
      - configmaps
      - replicationcontrollers
      - serviceaccounts
      - events
      - resourcequotas
      - limitranges
    verbs: ["get", "list", "watch"]
  # Apps resources
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  # Autoscaling resources
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  # Batch resources
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  # Networking resources
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  # Policy resources
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  # Storage resources
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  # Metrics (requires metrics-server)
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]

---
# 4. ClusterRoleBinding — bind dashboard-admin SA to the ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-cluster-reader-binding
  labels:
    app: kubernetes-dashboard
    role: control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dashboard-cluster-reader
subjects:
  - kind: ServiceAccount
    name: dashboard-admin
    namespace: control-plane

---
# Dashboard-internal secrets / settings (required for --auto-generate-certificates)
apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-dashboard-certs
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-dashboard-csrf
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
type: Opaque
stringData:
  csrf: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-dashboard-key-holder
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
type: Opaque
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-dashboard-settings
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
---
# Namespace-scoped permissions the Dashboard pod needs (cert rotation, UI proxy to scraper)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubernetes-dashboard
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - kubernetes-dashboard-key-holder
      - kubernetes-dashboard-certs
      - kubernetes-dashboard-csrf
    verbs: ["get", "update", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kubernetes-dashboard-settings"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["dashboard-metrics-scraper"]
    verbs: ["proxy"]
  - apiGroups: [""]
    resources: ["services/proxy"]
    resourceNames:
      - dashboard-metrics-scraper
      - http:dashboard-metrics-scraper
      - https:dashboard-metrics-scraper
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubernetes-dashboard
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubernetes-dashboard
subjects:
  - kind: ServiceAccount
    name: dashboard-admin
    namespace: control-plane

---
# ════════════════════════════════════════════════════════════════════════════════
# DASHBOARD DEPLOYMENT
# ════════════════════════════════════════════════════════════════════════════════

# 5. Kubernetes Dashboard Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-dashboard
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
    role: control-plane
    version: "v2.7.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kubernetes-dashboard
        role: control-plane
    spec:
      serviceAccountName: dashboard-admin   # Uses our RBAC service account

      # Prefer scheduling on control/master nodes (if labeled)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - kubernetes-dashboard
                topologyKey: kubernetes.io/hostname

      tolerations:
        # Allow scheduling on tainted control-plane / master nodes
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

      nodeSelector:
        kubernetes.io/os: linux

      containers:
        - name: kubernetes-dashboard
          image: kubernetesui/dashboard:v2.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              protocol: TCP
          args:
            - --auto-generate-certificates
            - --namespace=control-plane
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: kubernetes-dashboard-certs
              mountPath: /certs
            - name: dashboard-tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /
              port: 8443
            initialDelaySeconds: 30
            timeoutSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "200Mi"
            limits:
              cpu: "500m"
              memory: "500Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 2001

      volumes:
        - name: kubernetes-dashboard-certs
          secret:
            secretName: kubernetes-dashboard-certs
        - name: dashboard-tmp
          emptyDir: {}

---
# ════════════════════════════════════════════════════════════════════════════════
# DASHBOARD SERVICE
# ════════════════════════════════════════════════════════════════════════════════

# 6. Kubernetes Dashboard Service — NodePort for external access
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard
  namespace: control-plane
  labels:
    app: kubernetes-dashboard
    role: control-plane
spec:
  type: NodePort
  selector:
    app: kubernetes-dashboard
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8443
      nodePort: 30900     # External access: https://<node-ip>:30900

---
# ════════════════════════════════════════════════════════════════════════════════
# METRICS SCRAPER (optional — sidebar CPU/Memory graphs)
# ════════════════════════════════════════════════════════════════════════════════

# 7. Dashboard Metrics Scraper
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-metrics-scraper
  namespace: control-plane
  labels:
    app: dashboard-metrics-scraper
    role: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-metrics-scraper
  template:
    metadata:
      labels:
        app: dashboard-metrics-scraper
    spec:
      serviceAccountName: dashboard-admin
      containers:
        - name: dashboard-metrics-scraper
          image: kubernetesui/metrics-scraper:v1.0.9
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "200Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
      volumes:
        - name: tmp-volume
          emptyDir: {}

---
# 8. Metrics Scraper Service
apiVersion: v1
kind: Service
metadata:
  name: dashboard-metrics-scraper
  namespace: control-plane
  labels:
    app: dashboard-metrics-scraper
spec:
  selector:
    app: dashboard-metrics-scraper
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
