# ─── User Service Deployment ─── WorkerNode1 ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: user-ns
  labels:
    app: user-service
    version: "1.0.0"
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user-service
        version: "1.0.0"
        tier: backend
    spec:
      # Prefer WorkerNode1 when labels exist; still schedules on 1-node clusters (no Pending loop)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: microservices-monitor/node-group
                    operator: In
                    values:
                      - worker1

      terminationGracePeriodSeconds: 30

      containers:
        - name: user-service
          image: user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          env:
            - name: MONGO_URL
              value: "mongodb://mongodb-service.ecommerce.svc.cluster.local:27017"
            - name: DB_NAME
              value: "userdb"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
