# ─── User Service Deployment ───────────────────────────────────────────────────
# Multi-node, multi-pod: 3 replicas spread across nodes via anti-affinity
# and topology spread constraints.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce
  labels:
    app: user-service
    version: "1.0.0"
    tier: backend
spec:
  replicas: 3                          # 3 pods across multiple nodes
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                      # Allow 1 extra pod during update
      maxUnavailable: 0                # Zero-downtime rolling update
  template:
    metadata:
      labels:
        app: user-service
        version: "1.0.0"
        tier: backend
    spec:
      # ── Spread pods evenly across nodes ─────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: user-service

      # ── Anti-affinity: prefer different physical nodes ───────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - user-service
                topologyKey: kubernetes.io/hostname

      # ── Node preference: schedule on worker nodes ────────────────────────
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - user-service
                topologyKey: kubernetes.io/hostname

      # ── Graceful termination ─────────────────────────────────────────────
      terminationGracePeriodSeconds: 30

      containers:
        - name: user-service
          image: user-service:latest        # Replace with your registry image
          imagePullPolicy: IfNotPresent     # Change to Always for production registry
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          # ── Environment Variables ──────────────────────────────────────
          env:
            - name: MONGO_URL
              value: "mongodb://mongodb-service.ecommerce.svc.cluster.local:27017"
            - name: DB_NAME
              value: "userdb"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # ── Resource Requests/Limits (enables proper node scheduling) ──
          resources:
            requests:
              cpu: "100m"               # 0.1 CPU core guaranteed
              memory: "128Mi"           # 128MB RAM guaranteed
            limits:
              cpu: "500m"               # Max 0.5 CPU core
              memory: "256Mi"           # Max 256MB RAM

          # ── Health Probes ───────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 10
            periodSeconds: 5
