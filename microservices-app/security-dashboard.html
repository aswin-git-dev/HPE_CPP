<!DOCTYPE html>
<html>
<head>
  <title>Security Framework Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f7f3e8;
      color: #1f3b24;
    }

    header {
      background: #315c35;
      color: white;
      padding: 22px;
      text-align: center;
    }

    .container {
      padding: 40px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 30px;
      margin: auto;
      max-width: 800px;
      border-radius: 15px;
      box-shadow: 0 2px 10px #aaa;
    }

    a {
      display: block;
      background: #1f7a3a;
      color: white;
      padding: 16px;
      margin: 15px auto;
      width: 350px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
    }

    a:hover {
      background: #145326;
    }
  </style>
</head>

<body>

<header>
  <h1>Smart Security Logging Framework</h1>
  <p>Security Inspector/Guard Access</p>
</header>

<div class="container">
  <div class="card">
    <h2>Security Monitoring Dashboards</h2>

    <a href="http://127.0.0.1:18015/control-plane/ui" target="_blank">
      View Control Plane Logs
    </a>

    <a href="http://127.0.0.1:18015/control-plane/architecture/ui" target="_blank">
      View Kubernetes Architecture
    </a>

    <a href="https://securelogger.grafana.net" target="_blank">
      View Grafana Dashboard
    </a>

    <a href="http://127.0.0.1:5601" target="_blank">
      View OpenSearch Dashboard
    </a>
  </div>
</div>

</body>
</html>
