apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-node
  template:
    metadata:
      labels:
        app: frontend-node
    spec:
      containers:
      - name: curl-client
        image: curlimages/curl
        command: ["sh", "-c", "while true; do sleep 5; done"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-node
  template:
    metadata:
      labels:
        app: backend-node
    spec:
      containers:
      - name: nginx-server
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend-node
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
